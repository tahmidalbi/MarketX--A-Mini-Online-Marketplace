spring:
  application:
    name: marketx

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:marketx}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:2021}
    driver-class-name: org.postgresql.Driver

  docker:
    compose:
      file: compose-local.yaml

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  thymeleaf:
    cache: false

  mvc:
    hiddenmethod:
      filter:
        enabled: true

server:
  port: ${PORT:8080}

app:
  base-url: ${APP_BASE_URL:https://marketx-a-mini-online-marketplace-2.onrender.com}

sslcommerz:
  store-id: ${SSLCOMMERZ_STORE_ID:marke69ca7215b4079}
  store-password: ${SSLCOMMERZ_STORE_PASSWORD:marke69ca7215b4079@ssl}
  sandbox: ${SSLCOMMERZ_SANDBOX:true}