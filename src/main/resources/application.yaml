spring:
  application:
    name: marketx

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:marketx}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:2021}
    driver-class-name: org.postgresql.Driver

  docker:
    compose:
      file: compose-local.yaml

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

  mvc:
    hiddenmethod:
      filter:
        enabled: true

server:
  port: 8081