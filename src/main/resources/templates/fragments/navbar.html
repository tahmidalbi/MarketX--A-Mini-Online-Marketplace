<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar" th:fragment="navbar">

    <!-- LEFT: Brand -->
    <div class="nav-brand">
        <a th:href="@{/}">
            <div class="nav-logo-mark">
                <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 3l10 10M13 3L3 13"/>
                </svg>
            </div>
            <span class="nav-wordmark">Market<span>X</span></span>
        </a>
    </div>

    <!-- CENTER: Admin nav links -->
    <div class="nav-center" sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/admin/users}"
           th:classappend="${activePage == 'users'} ? ' active'"
           class="nav-link">Users</a>
        <a th:href="@{/admin/products}"
           th:classappend="${activePage == 'products'} ? ' active'"
           class="nav-link">Products</a>
        <a th:href="@{/admin/orders}"
           th:classappend="${activePage == 'orders'} ? ' active'"
           class="nav-link">Orders</a>
        <a th:href="@{/admin/statistics}"
           th:classappend="${activePage == 'statistics'} ? ' active'"
           class="nav-link">Statistics</a>
    </div>

    <!-- CENTER: Seller nav links -->
    <div class="nav-center" sec:authorize="hasRole('SELLER')">
        <a th:href="@{/seller/dashboard}"
           th:classappend="${activePage == 'home'} ? ' active'"
           class="nav-link">Home</a>
        <a th:href="@{/seller/my-products}"
           th:classappend="${activePage == 'my-products'} ? ' active'"
           class="nav-link">My Products</a>
        <a th:href="@{/seller/my-orders}"
           th:classappend="${activePage == 'my-orders'} ? ' active'"
           class="nav-link">My Orders</a>
    </div>

    <!-- CENTER: Buyer nav links -->
    <div class="nav-center" sec:authorize="hasRole('BUYER')">
        <a th:href="@{/buyer/dashboard}"
           th:classappend="${activePage == 'home'} ? ' active'"
           class="nav-link">Home</a>
        <a href="#"
           th:classappend="${activePage == 'cart'} ? ' active'"
           class="nav-link">Cart</a>
        <a href="#"
           th:classappend="${activePage == 'my-orders'} ? ' active'"
           class="nav-link">My Orders</a>
    </div>

    <!-- RIGHT: Auth controls -->
    <div class="nav-auth">

        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/auth/login}" class="btn btn-outline">Sign in</a>
            <a th:href="@{/auth/register}" class="btn btn-primary">Get started</a>
        </div>

        <div class="nav-user-info" sec:authorize="isAuthenticated()">
            <span sec:authorize="!hasRole('BUYER')">Hello, <strong sec:authentication="principal.user.name"></strong></span>

            <span sec:authorize="hasRole('BUYER')">
                <a th:href="@{/buyer/profile}"
                   th:classappend="${activePage == 'profile'} ? ' active'"
                   class="nav-link">Profile</a>
            </span>

            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <button type="submit" class="btn btn-sm btn-outline">Logout</button>
            </form>
        </div>
    </div>

</nav>
</body>
</html>
