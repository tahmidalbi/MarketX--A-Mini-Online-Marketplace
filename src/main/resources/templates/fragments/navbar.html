<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar" th:fragment="navbar">

    <!-- LEFT: auth controls -->
    <div class="nav-auth">

        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/auth/login}" class="btn btn-outline">Sign in</a>
            <a th:href="@{/auth/register}" class="btn btn-primary">Get started</a>
        </div>

        <div class="nav-user-info" sec:authorize="isAuthenticated()">
            <span>Hello, <strong sec:authentication="principal.user.name"></strong></span>

            <span sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/dashboard}" class="btn btn-sm btn-outline">Dashboard</a>
                <a th:href="@{/admin/users}" class="btn btn-sm btn-outline">Users</a>
            </span>
            <span sec:authorize="hasRole('SELLER')">
                <a th:href="@{/seller/dashboard}" class="btn btn-sm btn-outline">Dashboard</a>
            </span>
            <span sec:authorize="hasRole('BUYER')">
                <a th:href="@{/buyer/dashboard}" class="btn btn-sm btn-outline">Dashboard</a>
            </span>

            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <button type="submit" class="btn btn-sm btn-outline">Sign out</button>
            </form>
        </div>
    </div>

    <!-- RIGHT: brand -->
    <div class="nav-brand">
        <a th:href="@{/}">
            <div class="nav-logo-mark">
                <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 3l10 10M13 3L3 13"/>
                </svg>
            </div>
            <span class="nav-wordmark">Market<span>X</span></span>
        </a>
    </div>

</nav>
</body>
</html>
