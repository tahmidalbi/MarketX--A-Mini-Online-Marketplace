<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error – MarketX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <div class="status-page">
        <div class="status-code">500</div>
        <div class="status-title">Something Went Wrong</div>
        <p class="status-desc"
           th:text="${errorMessage != null ? errorMessage : 'An unexpected error occurred. Please try again.'}"></p>
        <a th:href="@{/}" class="btn btn-primary">Back to Home</a>
    </div>
</main>

<footer>
    <p>&copy; 2025 MarketX. All rights reserved.</p>
</footer>

</body>
</html>
