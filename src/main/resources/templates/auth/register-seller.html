<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Seller – MarketX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <div class="card card-sm">
        <h1>Apply as a Seller</h1>

        <div class="alert alert-info">
            Seller accounts require <strong>admin approval</strong> before you can log in.
            You will be notified once your account is reviewed.
        </div>

        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <form th:action="@{/auth/register/seller}" th:object="${sellerDto}" method="post">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" th:field="*{name}"
                       placeholder="Your full name" autofocus>
                <span class="field-error" th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"></span>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" th:field="*{email}"
                       placeholder="you@example.com">
                <span class="field-error" th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}"
                       placeholder="At least 6 characters">
                <span class="field-error" th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                       placeholder="Re-enter your password">
                <span class="field-error" th:if="${#fields.hasErrors('confirmPassword')}"
                      th:errors="*{confirmPassword}"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Submit Application</button>
        </form>

        <div class="form-footer">
            Want to shop instead? <a th:href="@{/auth/register/buyer}">Register as Buyer</a><br>
            Already have an account? <a th:href="@{/auth/login}">Sign in</a>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2025 MarketX. All rights reserved.</p>
</footer>

</body>
</html>
