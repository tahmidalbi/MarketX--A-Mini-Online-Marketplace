<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' — MarketX'">Product — MarketX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

    <!-- Back navigation -->
    <div style="margin-bottom:1.5rem">
        <a href="javascript:history.back()" class="back-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Back
        </a>
    </div>

    <!-- Product detail layout -->
    <div class="product-detail">

        <!-- Image -->
        <div class="product-detail-img-panel">
            <div class="product-detail-img-wrap">
                <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                     th:src="${product.imageUrl}" th:alt="${product.name}"
                     class="product-detail-img" />
                <div th:unless="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                     class="product-detail-img-placeholder">
                    <svg width="56" height="56" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="1"
                         stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <span>No image provided</span>
                </div>
            </div>
        </div>

        <!-- Info -->
        <div class="product-detail-info">

            <div class="product-detail-tags">
                <span class="badge badge-category" th:text="${product.category}"></span>
                <span th:class="${product.quantity > 0} ? 'stock-chip stock-ok' : 'stock-chip stock-empty'"
                      th:text="${product.quantity > 0 ? product.quantity + ' in stock' : 'Out of stock'}"></span>
            </div>

            <h1 class="product-detail-name" th:text="${product.name}"></h1>

            <div class="product-detail-seller">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                Sold by <strong th:text="${product.seller.name}"></strong>
            </div>

            <div class="product-detail-price"
                 th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></div>

            <div class="product-detail-divider"></div>

            <div class="product-detail-desc-label">About this product</div>
            <p class="product-detail-desc" th:text="${product.description}"></p>

            <div class="product-detail-divider"></div>

            <!-- Action -->
            <div class="product-detail-action">
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/auth/register/buyer}" class="btn btn-primary btn-full">
                        Sign up to purchase
                    </a>
                    <p class="form-footer" style="margin-top:.75rem">
                        Already have an account? <a th:href="@{/auth/login}">Sign in</a>
                    </p>
                </div>
                <div sec:authorize="hasRole('BUYER')">
                    <form th:action="@{/buyer/cart/add}" method="post">
                        <input type="hidden" name="productId" th:value="${product.id}"/>
                        <input type="hidden" name="quantity" value="1"/>
                        <button type="submit" class="btn btn-primary btn-full"
                                th:disabled="${product.quantity == 0}">
                            <span th:text="${product.quantity > 0} ? 'Add to Cart' : 'Out of Stock'">Add to Cart</span>
                        </button>
                    </form>
                </div>
                <div sec:authorize="isAuthenticated() and !hasRole('BUYER')">
                    <p style="color:var(--text-muted);font-size:.9rem;">Only buyers can purchase products.</p>
                </div>
            </div>

        </div>
    </div>

    <!-- ── Reviews Section ──────────────────────────────────────── -->
    <div class="reviews-section">

        <!-- Summary bar -->
        <div class="reviews-header">
            <h2 class="reviews-title">Customer Reviews</h2>
            <div class="reviews-summary" th:if="${reviewCount > 0}">
                <div class="reviews-avg-stars">
                    <span th:each="i : ${#numbers.sequence(1, 5)}"
                          th:with="isFull=${i <= avgStarsFloor}, isHalf=${i == (avgStarsFloor + 1) and avgHalfStar}"
                          th:class="${isFull ? 'star star-filled' : (isHalf ? 'star star-half' : 'star star-empty')}">&#9733;</span>
                </div>
                <span class="reviews-avg-score" th:text="${avgStars}">0</span>
                <span class="reviews-count" th:text="'(' + ${reviewCount} + ' review' + (${reviewCount} != 1 ? 's' : '') + ')'"></span>
            </div>
            <p class="reviews-none" th:if="${reviewCount == 0}">No reviews yet. Be the first!</p>
        </div>

        <!-- Write a review (BUYER only) -->
        <div sec:authorize="hasRole('BUYER')" class="review-form-card">
            <h3 class="review-form-title"
                th:text="${existingReview != null} ? 'Update Your Review' : 'Write a Review'">Write a Review</h3>

            <!-- flash messages -->
            <div class="alert alert-success" th:if="${reviewSuccess}" th:text="${reviewSuccess}"></div>
            <div class="alert alert-error"   th:if="${reviewError}"   th:text="${reviewError}"></div>

            <form th:action="@{'/buyer/review/' + ${product.id}}" method="post" class="review-form">
                <!-- Star picker -->
                <div class="star-picker" id="starPicker">
                    <label class="star-label" th:each="i : ${#numbers.sequence(5, 1, -1)}">
                        <input type="radio" name="stars" th:value="${i}"
                               th:checked="${existingReview != null and existingReview.stars == i}"/>
                        <span class="star-icon">&#9733;</span>
                    </label>
                </div>

                <!-- Comment -->
                <textarea name="comment" class="review-textarea" rows="3"
                          placeholder="Share your experience with this product..."
                          th:text="${existingReview != null} ? ${existingReview.comment} : ''"></textarea>

                <button type="submit" class="btn btn-primary"
                        th:text="${existingReview != null} ? 'Update Review' : 'Submit Review'">Submit Review</button>
            </form>
        </div>

        <!-- Review list -->
        <div class="review-list" th:if="${not #lists.isEmpty(reviews)}">
            <div class="review-card" th:each="review : ${reviews}">
                <div class="review-card-header">
                    <div class="review-card-stars">
                        <span th:each="i : ${#numbers.sequence(1, 5)}"
                              th:class="${i <= review.stars} ? 'star star-filled' : 'star star-empty'">&#9733;</span>
                    </div>
                    <div class="review-card-meta">
                        <span class="review-author" th:text="${review.buyer.name}">Buyer</span>
                        <span class="review-date"
                              th:text="${#temporals.format(review.createdAt, 'MMM d, yyyy')}">Date</span>
                    </div>
                </div>
                <p class="review-comment" th:text="${review.comment}"></p>
            </div>
        </div>

    </div>

</main>

<footer>
    <p>&copy; 2025 MarketX. All rights reserved.</p>
</footer>

</body>
</html>
