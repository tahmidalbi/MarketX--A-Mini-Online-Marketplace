<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' — MarketX'">Product — MarketX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

    <!-- Back navigation -->
    <div style="margin-bottom:1.5rem">
        <a href="javascript:history.back()" class="back-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Back
        </a>
    </div>

    <!-- Product detail layout -->
    <div class="product-detail">

        <!-- Image -->
        <div class="product-detail-img-panel">
            <div class="product-detail-img-wrap">
                <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                     th:src="${product.imageUrl}" th:alt="${product.name}"
                     class="product-detail-img" />
                <div th:unless="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                     class="product-detail-img-placeholder">
                    <svg width="56" height="56" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="1"
                         stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <span>No image provided</span>
                </div>
            </div>
        </div>

        <!-- Info -->
        <div class="product-detail-info">

            <div class="product-detail-tags">
                <span class="badge badge-category" th:text="${product.category}"></span>
                <span th:class="${product.quantity > 0} ? 'stock-chip stock-ok' : 'stock-chip stock-empty'"
                      th:text="${product.quantity > 0 ? product.quantity + ' in stock' : 'Out of stock'}"></span>
            </div>

            <h1 class="product-detail-name" th:text="${product.name}"></h1>

            <div class="product-detail-seller">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                Sold by <strong th:text="${product.seller.name}"></strong>
            </div>

            <div class="product-detail-price"
                 th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></div>

            <div class="product-detail-divider"></div>

            <div class="product-detail-desc-label">About this product</div>
            <p class="product-detail-desc" th:text="${product.description}"></p>

            <div class="product-detail-divider"></div>

            <!-- Action -->
            <div class="product-detail-action">
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/auth/register/buyer}" class="btn btn-primary btn-full">
                        Sign up to purchase
                    </a>
                    <p class="form-footer" style="margin-top:.75rem">
                        Already have an account? <a th:href="@{/auth/login}">Sign in</a>
                    </p>
                </div>
                <div sec:authorize="isAuthenticated()">
                    <button class="btn btn-primary btn-full" disabled style="opacity:.5; cursor:not-allowed">
                        Add to Cart — Coming Soon
                    </button>
                </div>
            </div>

        </div>
    </div>

</main>

<footer>
    <p>&copy; 2025 MarketX. All rights reserved.</p>
</footer>

</body>
</html>
