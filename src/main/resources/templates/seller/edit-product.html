<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product — MarketX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

    <div class="page-header">
        <div>
            <a th:href="@{/seller/my-products}" class="back-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                My Products
            </a>
            <h1 style="margin-top:.4rem">Edit Product</h1>
        </div>
    </div>

    <div class="form-card">

        <!-- Read-only product info -->
        <div class="product-readonly-info">
            <div class="product-readonly-img">
                <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                     th:src="${product.imageUrl}" th:alt="${product.name}" />
                <div th:unless="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                     class="product-img-placeholder product-img-placeholder-sm">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="1.5"
                         stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                </div>
            </div>
            <div class="product-readonly-meta">
                <h3 th:text="${product.name}"></h3>
                <div style="display:flex; gap:.5rem; margin-top:.4rem; flex-wrap:wrap">
                    <span class="badge badge-category" th:text="${product.category}"></span>
                    <span class="badge badge-info"
                          th:text="${product.quantity} + ' in stock'"></span>
                </div>
                <p class="readonly-hint" style="margin-top:.5rem">
                    Name, category, quantity, and image are locked. You can update price and description below.
                </p>
            </div>
        </div>

        <div class="form-divider"></div>

        <!-- Editable fields -->
        <form th:action="@{/seller/products/{id}(id=${product.id})}"
              th:object="${editDto}" method="post" novalidate>
            <input type="hidden" name="_method" value="PUT"/>

            <div class="form-grid">
                <!-- Price -->
                <div class="form-group">
                    <label for="price">Price (USD)</label>
                    <input type="number" id="price" th:field="*{price}"
                           placeholder="0.00" step="0.01" min="0.01" />
                    <span class="field-error" th:if="${#fields.hasErrors('price')}"
                          th:errors="*{price}"></span>
                </div>

                <!-- Spacer -->
                <div></div>

                <!-- Description -->
                <div class="form-group" style="grid-column: span 2">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}"
                              rows="5" placeholder="Describe your product…"></textarea>
                    <span class="field-error" th:if="${#fields.hasErrors('description')}"
                          th:errors="*{description}"></span>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/seller/my-products}" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2.5" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Save Changes
                </button>
            </div>

        </form>
    </div>

</main>

<footer>
    <p>&copy; 2025 MarketX. All rights reserved.</p>
</footer>

</body>
</html>
