<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products – MarketX Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

    <div class="page-header">
        <div>
            <h1>Products</h1>
            <p class="page-subtitle">All products listed on the marketplace</p>
        </div>
        <span class="badge badge-seller" th:text="${products.size()} + ' listings'"></span>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <!-- Search + Filter -->
    <div class="search-section">
        <form th:action="@{/admin/products}" method="get" class="search-form">
            <div class="search-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </div>
            <input type="text" name="q" th:value="${q}"
                   placeholder="Search products, categories, descriptions…"
                   class="search-input" autocomplete="off" />
            <select name="category" class="filter-select" onchange="this.form.submit()">
                <option value="" th:selected="${selectedCategory == ''}">All categories</option>
                <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"
                        th:selected="${selectedCategory == cat}"></option>
            </select>
            <a th:if="${(q != null and !q.isEmpty()) or (selectedCategory != null and !selectedCategory.isEmpty())}"
               th:href="@{/admin/products}" class="search-clear" title="Clear all">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </a>
        </form>
        <div class="search-meta"
             th:if="${(q != null and !q.isEmpty()) or (selectedCategory != null and !selectedCategory.isEmpty())}">
            <span th:text="${products.size()} + ' result(s)'
                + (${q != null and !q.isEmpty()} ? ' for \'' + ${q} + '\'' : '')
                + (${selectedCategory != null and !selectedCategory.isEmpty()} ? ' in ' + ${selectedCategory} : '')">
            </span>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${products.isEmpty()}" class="empty-state-full">
        <div class="empty-icon-lg">🛍️</div>
        <h3 th:if="${(q != null and !q.isEmpty()) or (selectedCategory != null and !selectedCategory.isEmpty())}">No results found</h3>
        <h3 th:unless="${(q != null and !q.isEmpty()) or (selectedCategory != null and !selectedCategory.isEmpty())}">No products yet</h3>
        <p>Sellers haven't listed anything yet.</p>
    </div>

    <!-- Product grid with admin remove action -->
    <div class="product-grid" th:unless="${products.isEmpty()}">
        <div th:each="p : ${products}" class="product-card admin-product-card">

            <!-- Clickable area → product detail -->
            <a th:href="@{/products/{id}(id=${p.id})}" class="product-card-link">
                <div class="product-img-wrap">
                    <img th:if="${p.imageUrl != null and !p.imageUrl.isEmpty()}"
                         th:src="${p.imageUrl}" th:alt="${p.name}" class="product-img" />
                    <div th:unless="${p.imageUrl != null and !p.imageUrl.isEmpty()}"
                         class="product-img-placeholder">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="1.5"
                             stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
                        </svg>
                    </div>
                    <span class="product-category-badge" th:text="${p.category}"></span>
                </div>
                <div class="product-card-body">
                    <p class="product-seller">by <span th:text="${p.seller.name}"></span></p>
                    <h3 class="product-name" th:text="${p.name}"></h3>
                    <p class="product-desc" th:text="${p.description}"></p>
                    <div class="product-footer">
                        <span class="product-price"
                              th:text="'$' + ${#numbers.formatDecimal(p.price, 1, 2)}"></span>
                        <span th:class="${p.quantity > 0} ? 'stock-chip stock-ok' : 'stock-chip stock-empty'"
                              th:text="${p.quantity > 0 ? p.quantity + ' in stock' : 'Out of stock'}"></span>
                    </div>
                </div>
            </a>

            <!-- Admin remove action -->
            <div class="admin-product-actions">
                <form th:action="@{/admin/products/{id}(id=${p.id})}" method="post"
                      onsubmit="return confirm('Remove this product? This cannot be undone.')">
                    <input type="hidden" name="_method" value="DELETE"/>
                    <button type="submit" class="btn btn-danger btn-full btn-sm">Remove</button>
                </form>
            </div>

        </div>
    </div>

</main>

<footer>
    <p>&copy; 2025 MarketX. All rights reserved.</p>
</footer>

</body>
</html>
