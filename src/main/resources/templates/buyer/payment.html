<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review &amp; Pay — MarketX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

    <div class="page-header">
        <div>
            <h1>Review &amp; Pay</h1>
            <p class="page-subtitle">Confirm your order and proceed to SSLCommerz secure payment</p>
        </div>
        <a th:href="@{/buyer/checkout}" class="btn btn-outline">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Back to Checkout
        </a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <!-- Step indicator -->
    <div class="payment-steps">
        <span class="step step-done">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            Cart
        </span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="step-arrow"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        <span class="step step-done">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            Shipping
        </span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="step-arrow"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        <span class="step step-active">Payment</span>
    </div>

    <div class="cart-layout" style="margin-top:1.5rem">

        <!-- Order summary -->
        <div>
            <div class="card">
                <h2 style="margin-bottom:1rem;font-size:1rem">Order Items</h2>
                <div th:each="item : ${cartItems}" style="display:flex;justify-content:space-between;margin-bottom:.6rem;font-size:.9rem;">
                    <span th:text="${item.product.name} + ' × ' + ${item.quantity}"></span>
                    <strong th:text="'$' + ${item.product.price * item.quantity}"></strong>
                </div>
                <hr style="margin:1rem 0;border:none;border-top:1px solid var(--border)"/>

                <div style="display:flex;justify-content:space-between;margin-bottom:.75rem;font-size:.85rem;color:var(--text-muted)">
                    <span>Shipping address</span>
                    <span th:text="${shippingAddress}" style="text-align:right;max-width:60%"></span>
                </div>

                <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.05rem;">
                    <span>Total</span>
                    <span th:text="'$' + ${cartTotal}"></span>
                </div>
            </div>

            <!-- SSLCommerz payment button -->
            <div class="card" style="margin-top:1.25rem;text-align:center;">
                <div style="margin-bottom:1rem;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="1.5" style="vertical-align:middle"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                    <p style="margin:.5rem 0 0;font-size:.85rem;color:var(--text-muted)">
                        You will be redirected to <strong>SSLCommerz</strong> secure payment gateway
                    </p>
                </div>

                <form th:action="@{/buyer/payment}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-primary" style="width:100%;padding:.75rem;font-size:1rem;font-weight:600;">
                        Pay with SSLCommerz
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="margin-left:.4rem"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </form>

                <p style="margin-top:.75rem;font-size:.75rem;color:var(--text-muted);">
                    🔒 Secured by SSLCommerz — your payment info is never stored on our servers
                </p>
            </div>
        </div>

        <!-- Right spacer -->
        <div></div>
    </div>

</main>

</body>
</html>
