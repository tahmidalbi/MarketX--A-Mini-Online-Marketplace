<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — MarketX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

    <div class="page-header">
        <div>
            <h1>Checkout</h1>
            <p class="page-subtitle">Review your order and confirm</p>
        </div>
        <a th:href="@{/buyer/cart}" class="btn btn-outline">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Back to Cart
        </a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <div class="cart-layout">

        <!-- Checkout Form -->
        <div>
            <!-- Order Review -->
            <div class="card" style="margin-bottom:1.25rem">
                <h2 style="margin-bottom:1rem;font-size:1rem">Items in this order</h2>
                <div th:each="item : ${cartItems}" class="checkout-item-row">
                    <div class="checkout-item-info">
                        <div class="table-thumb" style="flex-shrink:0">
                            <img th:if="${item.product.imageUrl != null and !item.product.imageUrl.isEmpty()}"
                                 th:src="${item.product.imageUrl}" th:alt="${item.product.name}" />
                            <div th:unless="${item.product.imageUrl != null and !item.product.imageUrl.isEmpty()}" class="table-thumb-placeholder">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                            </div>
                        </div>
                        <div>
                            <p style="font-weight:500;font-size:.85rem;color:var(--text)" th:text="${item.product.name}"></p>
                            <p style="font-size:.75rem;color:var(--text-muted)" th:text="'Qty: ' + ${item.quantity} + '  ×  $' + ${#numbers.formatDecimal(item.product.price, 1, 2)}"></p>
                        </div>
                    </div>
                    <span class="td-price" th:text="'$' + ${#numbers.formatDecimal(item.product.price.multiply(T(java.math.BigDecimal).valueOf(item.quantity)), 1, 2)}"></span>
                </div>
            </div>

            <!-- Shipping Address -->
            <div class="card">
                <h2 style="margin-bottom:1.25rem;font-size:1rem">Shipping Details</h2>
                <form th:action="@{/buyer/checkout}" th:object="${checkoutDto}" method="post" novalidate>
                    <div class="form-group">
                        <label for="shippingAddress">Delivery Address</label>
                        <textarea id="shippingAddress" th:field="*{shippingAddress}"
                                  rows="3" placeholder="Enter your full delivery address…"
                                  style="width:100%;padding:.65rem .9rem;border:1px solid var(--border-strong);border-radius:var(--radius);font-size:.875rem;font-family:inherit;color:var(--text);background:var(--bg-elevated);outline:none;resize:vertical"></textarea>
                        <span class="field-error" th:if="${#fields.hasErrors('shippingAddress')}" th:errors="*{shippingAddress}"></span>
                    </div>

                    <div class="form-actions" style="margin-top:1.5rem">
                        <a th:href="@{/buyer/cart}" class="btn btn-outline">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            Place Order
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Summary -->
        <div class="cart-summary-card card">
            <h2 style="margin-bottom:1.25rem">Order Total</h2>
            <div class="summary-row" th:each="item : ${cartItems}">
                <span th:text="${item.product.name}" style="color:var(--text-muted);font-size:.8rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                <span th:text="'$' + ${#numbers.formatDecimal(item.product.price.multiply(T(java.math.BigDecimal).valueOf(item.quantity)), 1, 2)}" style="font-size:.8rem"></span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-row summary-total">
                <span>Total</span>
                <span th:text="'$' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></span>
            </div>
            <p style="font-size:.72rem;color:var(--text-dim);margin-top:1rem;line-height:1.6">
                By placing this order you agree to our Terms of Service. Payment is collected on delivery.
            </p>
        </div>

    </div>

</main>

<footer><p>&copy; 2025 MarketX. All rights reserved.</p></footer>

</body>
</html>
