<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart — MarketX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

    <div class="page-header">
        <div>
            <h1>My Cart</h1>
            <p class="page-subtitle" th:text="${cartItems.size()} + ' item(s)'"></p>
        </div>
        <a th:href="@{/buyer/dashboard}" class="btn btn-outline">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Continue Shopping
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <!-- Empty Cart -->
    <div th:if="${cartItems.isEmpty()}" class="empty-state-full">
        <div class="empty-icon-lg">🛒</div>
        <h3>Your cart is empty</h3>
        <p>Browse products and add items to your cart.</p>
        <a th:href="@{/buyer/dashboard}" class="btn btn-primary" style="margin-top:1.25rem">Browse Products</a>
    </div>

    <!-- Cart Content -->
    <div th:unless="${cartItems.isEmpty()}" class="cart-layout">

        <!-- Items -->
        <div class="cart-items-section">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width:60px">Image</th>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cartItems}">
                            <td>
                                <div class="table-thumb">
                                    <img th:if="${item.product.imageUrl != null and !item.product.imageUrl.isEmpty()}"
                                         th:src="${item.product.imageUrl}" th:alt="${item.product.name}" />
                                    <div th:unless="${item.product.imageUrl != null and !item.product.imageUrl.isEmpty()}"
                                         class="table-thumb-placeholder">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="td-name" th:text="${item.product.name}"></span>
                                <span class="badge badge-category" th:text="${item.product.category}" style="margin-top:.3rem;display:inline-block"></span>
                                <p style="font-size:.73rem;color:var(--text-muted);margin-top:.2rem" th:text="'by ' + ${item.product.seller.name}"></p>
                            </td>
                            <td>
                                <span class="td-price" th:text="'$' + ${#numbers.formatDecimal(item.product.price, 1, 2)}"></span>
                            </td>
                            <td>
                                <form th:action="@{/buyer/cart/{id}/update(id=${item.id})}" method="post" class="qty-form">
                                    <input type="hidden" name="_method" value="POST"/>
                                    <div class="qty-control">
                                        <button type="submit" name="quantity" th:value="${item.quantity - 1}" class="qty-btn">−</button>
                                        <span class="qty-display" th:text="${item.quantity}"></span>
                                        <button type="submit" name="quantity" th:value="${item.quantity + 1}" class="qty-btn">+</button>
                                    </div>
                                </form>
                            </td>
                            <td>
                                <span class="td-price" th:text="'$' + ${#numbers.formatDecimal(item.product.price.multiply(T(java.math.BigDecimal).valueOf(item.quantity)), 1, 2)}"></span>
                            </td>
                            <td>
                                <form th:action="@{/buyer/cart/{id}/remove(id=${item.id})}" method="post">
                                    <button type="submit" class="btn btn-danger btn-sm" title="Remove">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="cart-summary-card card">
            <h2 style="margin-bottom:1.25rem">Order Summary</h2>

            <div class="summary-row" th:each="item : ${cartItems}">
                <span th:text="${item.product.name}" style="color:var(--text-muted);font-size:.8rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                <span th:text="'$' + ${#numbers.formatDecimal(item.product.price.multiply(T(java.math.BigDecimal).valueOf(item.quantity)), 1, 2)}" style="font-size:.8rem"></span>
            </div>

            <div class="summary-divider"></div>

            <div class="summary-row summary-total">
                <span>Total</span>
                <span th:text="'$' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></span>
            </div>

            <a th:href="@{/buyer/checkout}" class="btn btn-primary btn-full" style="margin-top:1.5rem">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                Proceed to Checkout
            </a>
        </div>

    </div>

</main>

<footer><p>&copy; 2025 MarketX. All rights reserved.</p></footer>

</body>
</html>
