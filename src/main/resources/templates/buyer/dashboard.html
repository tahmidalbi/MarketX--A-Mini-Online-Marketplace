<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard – MarketX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

    <div class="dashboard-welcome">
        <h2>Welcome, <span th:text="${user.name}"></span>!</h2>
        <p>You are logged in as a <strong>Buyer</strong>. Browse products and place orders.</p>
    </div>

    <div class="card">
        <h2 style="margin-bottom:1rem;">Your Shopping Hub</h2>
        <p style="color:var(--text-muted);">
            Product browsing and order management features are coming soon. Stay tuned!
        </p>
    </div>

</main>

<footer>
    <p>&copy; 2025 MarketX. All rights reserved.</p>
</footer>

</body>
</html>
