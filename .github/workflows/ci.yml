name: MarketX CI

on:
  push:
    branches:
      - develop
      - main
      - "feature/**"

  pull_request:
    branches:
      - develop
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: maven

      - name: Build Project
        run: mvn -B clean compile

      - name: Run Tests
        run: mvn test

      - name: Package Application
        run: mvn package